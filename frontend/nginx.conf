server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve the backend container name on each request — useful when the
    # backend container restarts and gets a new IP on the bridge network.
    # 127.0.0.11 is Docker's embedded DNS; Podman's compose stack works the
    # same way.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream rental-backend;

    # Security headers — applied to every response (including SPA index.html).
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-Frame-Options        "DENY"                            always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # Uncomment when serving the app over HTTPS only:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy API and authenticated document downloads to the backend.
    # `client_max_body_size` must match `MAX_UPLOAD_BYTES` in
    # backend/app/routers/documents.py so the edge rejects oversize uploads
    # before they ever reach uvicorn (which would otherwise buffer them
    # entirely in memory before the 413).
    location /api/ {
        client_max_body_size 25M;
        proxy_pass         http://$upstream:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_pass_header  Set-Cookie;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        return 200 "ok";
    }
}
